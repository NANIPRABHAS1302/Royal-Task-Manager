<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Royal Gold Gradient -->
    <linearGradient id="royalGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE79A" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#9A7B1C" />
    </linearGradient>

    <!-- Cyber Blue Gradient -->
    <linearGradient id="cyberBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072FF" />
      <stop offset="50%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield Shadow / Accent -->
  <path d="M 50,5 C 75,5 90,20 90,45 C 90,75 50,95 50,95 C 50,95 10,75 10,45 C 10,20 25,5 50,5 Z" 
        fill="none" stroke="url(#cyberBlue)" stroke-width="2" stroke-opacity="0.15" />

  <!-- The Crown Shape (Gold) -->
  <path d="M 25,65 
           L 15,35 
           L 35,50 
           L 50,20 
           L 65,50 
           L 85,35 
           L 75,65 
           Z" 
        fill="url(#royalGold)" 
        filter="drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.3))" />

  <!-- Crown Base Band (Gold Accent) -->
  <path d="M 22,67 C 36,71 64,71 78,67 L 76,72 C 62,76 38,76 24,72 Z" fill="url(#royalGold)" />

  <!-- Jewels on the Crown Peaks -->
  <circle cx="15" cy="33" r="2.5" fill="#FFFFFF" filter="url(#glow)" />
  <circle cx="50" cy="18" r="3.5" fill="#FFFFFF" filter="url(#glow)" />
  <circle cx="85" cy="33" r="2.5" fill="#FFFFFF" filter="url(#glow)" />

  <!-- The Completed Task Checkmark (Cyber Blue) -->
  <path d="M 32,52 
           L 46,67 
           L 78,22" 
        fill="none" 
        stroke="url(#cyberBlue)" 
        stroke-width="7" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="drop-shadow(0px 3px 6px rgba(0, 229, 255, 0.4))" />
</svg>
